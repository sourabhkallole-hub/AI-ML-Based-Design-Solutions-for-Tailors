{% csrf_token %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Page</title>
  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Custom Styles -->
  <style>
    body {
      background: linear-gradient(135deg, #BE9278, #a4b1e7);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      padding: 2rem;
      border-radius: 15px;
      background: white;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      animation: fadeInUp 1s ease forwards;
      opacity: 0;
    }

    @keyframes fadeInUp {
      0% {
        opacity: 0;
        transform: translateY(40px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .form-control:focus {
      box-shadow: none;
      border-color: #74ebd5;
    }

    .btn-primary {
      background-color: #BE9278;
      border-color: #BE9278;
    }

    .btn-primary:hover {
      background-color: #5fd1c4;
      border-color: #5fd1c4;
    }
  </style>
</head>
<body>

  <div class="login-card text-center">
    <h3 class="mb-4">Login</h3>
    <form>
      <div class="mb-3 text-start">
        <label for="email" class="form-label">Email address</label>
        <input type="email" class="form-control" id="txtEmail" required>
      </div>
      <div class="mb-4 text-start">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="txtPassword" required>
        <span id="passwordError" style="color: red;">
          Password must be at least 8 characters long, include one uppercase letter, one lowercase letter, one number, and one special character.
        </span>
      </div>
      <button type="button" id="btn_submit" class="btn btn-primary w-100">Login</button>
    </form>
    <div>
      <a href="/register/">Register</a>
    </div>
  </div>

  <!-- Bootstrap JS (Optional, for future interactivity) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

<script type="text/javascript">
  $(document).ready(function() {

    $("#btn_submit").click(function (e) {

      if ($("#txtEmail").val().trim().length < 1) {
          alert("Please Enter Email");
          $("#txtEmail").focus();
          return false;
      }

      if ($("#txtPassword").val().trim().length < 1) {
          alert("Please Enter Password");
          $("#txtPassword").focus();
          return false;
      }

        let formData = new FormData();

        formData.append("txtEmail", $("#txtEmail").val());
        formData.append("txtPassword", $("#txtPassword").val());
        formData.append(
            "csrfmiddlewaretoken",
            $("input[name=csrfmiddlewaretoken]").val()
        );

      $.ajax({
        beforeSend: function () {
          $("#signin").attr("disabled", true);
        },
        url: "/web_login/",
        type: "POST",
        data: formData,
        processData: false,
        contentType: false,
        success: function (result) {
          if(result == "0") {
            alert("Invalid Email OR Password, Try again!!!");
          } else {
            window.location = "/index/";
          }
          
        },
        error: function (request, error) {
          console.error(error);
        },
        complete: function () {
          $("#btn_submit").attr("disabled", false);
        },
      });
    });

  });
</script>
