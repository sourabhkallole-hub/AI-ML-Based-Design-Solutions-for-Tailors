<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register Page</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom Styles -->
  <style>
    body {
      background: linear-gradient(135deg, #BE9278, #a4b1e7);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
    }

    .register-card {
      width: 100%;
      max-width: 500px;
      background: #fff;
      padding: 2rem;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      animation: slideFadeIn 1.2s ease;
    }

    @keyframes slideFadeIn {
      from {
        opacity: 0;
        transform: translateY(50px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .form-control:focus {
      box-shadow: none;
      border-color: #fda085;
    }

    .btn-primary {
      background-color: #BE9278;
      border-color: #BE9278;
    }

      .btn-primary:hover {
      background-color: #5fd1c4;
      border-color: #5fd1c4;
    }
  </style>
</head>
<body>

  <div class="register-card">
    <h3 class="text-center mb-4">Create Account</h3>
    <form>
      <div class="mb-3">
        <label for="fullname" class="form-label">Full Name</label>
        <input type="text" class="form-control" id="txtName" required>
      </div>
         <div class="mb-3">
        <label for="number" class="form-label">Mobile Number</label>
        <input type="number" class="form-control" id="txtMobileNo" required>
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" class="form-control" id="txtEmail" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="txtPassword" required>
        <span id="passwordError" style="color: red;">
          Password must be at least 8 characters long, include one uppercase letter, one lowercase letter, one number, and one special character.
        </span>
      </div>
      <button type="button" id="btn_submit" class="btn btn-primary w-100">Register</button>
      <p class="text-center mt-3"><a href="/">Login</a></p>

    </form>
  </div>

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>


<script type="text/javascript">
  $(document).ready(function(){

    $("#btn_submit").click(function (e) {
      if ($("#txtName").val().trim().length < 1) {
          alert("Please Enter Full Name");
          $("#txtName").focus();
          return false;
      }

      if ($("#txtEmail").val().trim().length < 1) {
          alert("Please Enter Email");
          $("#txtEmail").focus();
          return false;
      }

      if (!validateEmail($("#txtEmail").val())) {
          alert("Please Enter Valid Email");
          $("#txtEmail").focus();
          return false;
      }

       if ($("#txtMobileNo").val().trim().length < 10) {
          alert("Please Enter Mobile number");
          $("#txtMobileNo").focus();
          return false;
        }

      if ($("#txtPassword").val().trim().length < 1) {
          alert("Please Enter Password");
          $("#txtPassword").focus();
          return false;
      }

      pass = document.getElementById("txtPassword").value;
      regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
      if (regex.exec(pass) == null) {
        alert('Please Enter Valid Password Format');
        return false;
      }

        let formData = new FormData();

      formData.append("txtName", $("#txtName").val());
      formData.append("txtEmail", $("#txtEmail").val());
      formData.append("txtMobileNo", $("#txtMobileNo").val());
      formData.append("txtPassword", $("#txtPassword").val());
      formData.append(
        "csrfmiddlewaretoken",
        $("input[name=csrfmiddlewaretoken]").val()
      );

      $.ajax({
        beforeSend: function () {
          $("#btn_submit").attr("disabled", true);
        },
        url: "/add_register/",
        type: "POST",
        data: formData,
        processData: false,
        contentType: false,
        success: function (result) {

          if(result == "10") {
            alert("You are already Registered, Try to Login");
          } else {
            alert("Registration Successful");
            window.location = "/";
          }
          
        },
        error: function (request, error) {
          console.error(error);
        },
        complete: function () {
          $("#btn_submit").attr("disabled", false);
        },
      });
    });

  });



  function alphaOnly(event) {
    var key = event.which ? event.which : event.keyCode;
    return (
      (key >= 65 && key <= 90) ||
      key === 8 ||
      (event.charCode >= 97 && event.charCode <= 122) ||
      event.charCode === 32
    );
  }

  function validateEmail(paramEmailID) {
    var filter = /^[0-9a-z.]+@[a-z0-9]+\.[a-zA-Z0-9]{2,4}$/;
    return filter.test(paramEmailID);
  }

  function isNumberKey(evt) {
    var charCode = evt.which ? evt.which : event.keyCode;
    return !(charCode > 31 && (charCode < 48 || charCode > 57));
  }

</script>
