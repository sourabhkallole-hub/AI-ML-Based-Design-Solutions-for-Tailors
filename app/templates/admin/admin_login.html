{% csrf_token %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Secure Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

  <style>
    body {
      background: linear-gradient(135deg, #007bff, #00c6ff);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }

    .login-box {
      background: #fff;
      padding: 40px 30px;
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 400px;
    }

    .login-box h3 {
      margin-bottom: 20px;
      font-weight: 600;
      color: #333;
    }

    .form-control {
      border-radius: 8px;
      padding: 12px 15px;
      font-size: 15px;
    }

    .btn-login {
      border-radius: 8px;
      padding: 12px;
      font-size: 16px;
      font-weight: 500;
    }

    .footer-link {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
    }

    .footer-link a {
      color: #007bff;
      text-decoration: none;
    }

    .footer-link a:hover {
      text-decoration: underline;
    }

    .logo-img {
      width: 60px;
      height: 60px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

  <div class="login-box text-center">
    <img src="https://cdn-icons-png.flaticon.com/512/847/847969.png" class="logo-img" alt="User Icon">
    <h3>Welcome Back</h3>
    <form class="text-start" id="loginForm">
      <div class="mb-3">
        <label for="txtEmail" class="form-label">Email</label>
        <input type="email" class="form-control" id="txtEmail" placeholder="Enter email" required>
      </div>

      <div class="mb-3">
        <label for="txtPassword" class="form-label">Password</label>
        <input type="password" class="form-control" id="txtPassword" placeholder="Enter password" required>
      </div>

      <button type="button" id="login" class="btn btn-primary w-100 btn-login">Sign In</button>
      <a href="/"> Go To Website</a>
    </form>
  </div>

  <script type="text/javascript">
    $("#login").click(function (e) {
      if ($("#txtEmail").val().trim().length < 1) {
        alert("Please Enter Email");
        $("#txtEmail").focus();
        return false;
      }

      if ($("#txtPassword").val().trim().length < 1) {
        alert("Please Enter Password");
        $("#txtPassword").focus();
        return false;
      }

      var formData = new FormData();
      formData.append("txtEmail", $("#txtEmail").val());
      formData.append("txtPassword", $("#txtPassword").val());
      formData.append("csrfmiddlewaretoken", $('input[name=csrfmiddlewaretoken]').val());

      $.ajax({
        url: "/login_admin/",
        type: "POST",
        data: formData,
        processData: false,
        contentType: false,
        success: function (result) {
          if (result == '10') {
            alert("Invalid Email OR Password");
          } else {
            if (result == "Admin") {
              window.location = "/admin_master/";
            } else {
              window.location = "/tailor_bookings/";
            }
          }
        },
        error: function (request, error) {
          console.error(error);
        }
      });
    });
  </script>

</body>
</html>
